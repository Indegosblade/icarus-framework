name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Every job in this workflow only needs to read repository contents. Keeping the
# default token read-only limits the blast radius of a compromised dependency or
# action, especially once pull requests can come from public forks.
permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy icarus/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: bandit -r icarus/ -c pyproject.toml

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install ICARUS and the dependency auditor
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pip-audit==2.10.1
      - name: Audit the installed dependency set
        # HYGEIA is installed from a VCS URL and pip-audit reports it as an
        # explicit skip; all PyPI-resolvable runtime packages remain gated.
        run: >-
          python -m pip_audit --local --progress-spinner off
          --cache-dir "$RUNNER_TEMP/pip-audit-cache"
