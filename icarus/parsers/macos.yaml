parser_id: "macos"
version: "1.0.0"
spec_version: "icarus-parser/1.0"
author: "Indegosblade"
license: "PolyForm-Noncommercial-1.0.0"
quality_tier: "candidate"
description: "macOS / iOS root filesystem — daemons, Mach services, entitlements, kexts, frameworks"
identify:
  specificity_level: 8
  markers:
    - type: "path"
      path: "System/Library/LaunchDaemons"
      description: "launchd daemon job directory"
    - type: "path"
      path: "System/Library/CoreServices/SystemVersion.plist"
      description: "OS version marker plist"
  confidence: 0.95
consumes:
  - "application/x-plist"
  - "application/x-mach-binary"
produces:
  entity_types:
    - files
    - binaries
    - daemons
    - mach_services
    - entitlements
    - kexts
    - frameworks
    - sandbox_profiles
dependencies:
  tools: []
  python: []
reliability: "B"
default_confidence: 0.9
tests:
  fixtures_dir: "tests/fixtures/macos/"
  min_entities: 1
  golden_output: "tests/golden/macos.json"
