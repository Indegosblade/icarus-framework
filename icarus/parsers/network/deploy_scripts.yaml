parser_id: "network/deploy_scripts"
version: "1.0.0"
spec_version: "icarus-parser/1.0"
author: "Indegosblade"
license: "PolyForm-Noncommercial-1.0.0"
quality_tier: "candidate"
description: "Paramiko-based deploy/fix scripts for remote server management"
identify:
  specificity_level: 15
  markers:
    - type: "path"
      path: "scripts/"
      description: "Directory containing Python deploy/fix scripts"
    - type: "content"
      pattern: "import paramiko"
      description: "Scripts use paramiko for SSH connections"
  confidence: 0.90
consumes:
  - "text/x-python"
produces:
  entity_types:
    - files
    - binaries
    - daemons
    - observations
    - entitlements
  event_types:
    - "ssh_connection"
    - "remote_command"
    - "service_management"
    - "file_upload"
dependencies:
  tools: []
  python: []
reliability: "B"
default_confidence: 0.80
tests:
  fixtures_dir: "tests/fixtures/network_deploy_scripts/"
  min_entities: 1
  golden_output: "tests/golden/network_deploy_scripts.json"
