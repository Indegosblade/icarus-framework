parser_id: "windows"
version: "1.0.0"
spec_version: "icarus-parser/1.0"
author: "Indegosblade"
license: "PolyForm-Noncommercial-1.0.0"
quality_tier: "production"
description: "Windows application directory or filesystem tree"
identify:
  specificity_level: 20
  markers:
    - type: "file_extension"
      pattern: "*.exe"
    - type: "file_extension"
      pattern: "*.dll"
  confidence: 0.85
consumes:
  - "application/x-ms-dos-executable"
  - "application/x-dosexec"
produces:
  entity_types: ["files", "binaries", "frameworks"]
dependencies:
  tools: []
  python: []
reliability: "B"
default_confidence: 0.85
tests:
  fixtures_dir: "tests/fixtures/windows/"
  min_entities: 1
  golden_output: "tests/golden/windows.json"
