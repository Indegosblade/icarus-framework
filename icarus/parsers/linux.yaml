parser_id: "linux"
version: "1.0.0"
spec_version: "icarus-parser/1.0"
author: "Indegosblade"
license: "PolyForm-Noncommercial-1.0.0"
quality_tier: "production"
description: "Linux filesystem rootfs (debootstrap, container export, etc.)"
identify:
  specificity_level: 20
  markers:
    - type: "path"
      path: "etc/passwd"
    - type: "path"
      path: "usr/bin"
    - type: "path"
      path: "lib/systemd"
  confidence: 0.90
consumes:
  - "application/x-elf"
  - "application/x-executable"
produces:
  entity_types: ["files", "binaries", "daemons", "frameworks"]
dependencies:
  tools: ["readelf"]
  python: []
reliability: "B"
default_confidence: 0.90
tests:
  fixtures_dir: "tests/fixtures/linux/"
  min_entities: 1
  golden_output: "tests/golden/linux.json"
